<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor MP3/MP4</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Conversor MP3/MP4</h1>

  <input type="text" id="videoUrl" placeholder="Cole o link do vídeo">

  <div class="buttons">
    <button onclick="convert('mp3')">MP3</button>
    <button onclick="convert('mp4')">MP4</button>
  </div>

  <div id="status"></div>
</div>

<script src="script.js"></script>
</body>
</html>
